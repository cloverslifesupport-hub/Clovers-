<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloversLife INC</title>
  <style>
    body { background-color: #000000 !important; color: #ffffff !important; margin: 0; padding: 20px; font-family: sans-serif; }
    .jewelry-card { max-width: 400px; margin: 0 auto; }
    .brand-badge { font-weight: bold; font-size: 18px; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
    .main-product-img { width: 100%; border-radius: 8px; display: block; margin-bottom: 15px; }
    .jewelry-details h4 { font-size: 22px; margin: 10px 0; font-weight: 700; }
    .collection-tag { font-size: 12px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }
    .price-tag { font-size: 24px; font-weight: bold; margin: 15px 0; }
    .description { font-size: 14px; color: #ccc; line-height: 1.5; margin-bottom: 25px; }
    
    .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 20px; margin-bottom: 50px; margin-top: 30px; }
    .option-card { 
        display: flex; flex-direction: column; align-items: center; border: 1px solid #333; 
        border-radius: 8px; padding: 10px; background: #111; cursor: pointer; 
        transition: all 0.3s ease; overflow: visible; z-index: 1;
    }
    .option-card img { width: 50px; height: 50px; border-radius: 4px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
    .option-card.active { border-color: #ffffff; z-index: 10; }
    .option-card.active img { transform: scale(2.0); box-shadow: 0 10px 25px rgba(0,0,0,0.8); } 
    .option-card span { font-size: 11px; font-weight: 600; text-align: center; margin-bottom: 6px; margin-top: 25px; }
    .select-indicator { font-size: 10px; font-weight: bold; padding: 4px 8px; border: 1px solid #444; border-radius: 4px; color: #888; text-transform: uppercase; margin-top: 5px; }
    .option-card.active .select-indicator { background: #fff; color: #000; border-color: #fff; }

    input, select { width: 100%; padding: 15px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
    .shipment-box { border: 1px solid #333; border-radius: 8px; padding: 15px; background: #111; margin-bottom: 20px; }
    .shipment-option { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
    .summary-box { border: 1px dashed #333; padding: 15px; margin-bottom: 20px; background: #050505; color: #fff; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #aaa; }
    .total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-top: 10px; }
    button { width: 100%; background: #ffffff; color: #000000; border: none; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 8px; margin-top: 15px; }
  </style>
</head>
<body>

<div class="jewelry-card">
  <div class="brand-badge">CloversLife INC💎</div>
  <img src="https://i.ibb.co/zWPr8Q5b/IMG-7586.jpg" class="main-product-img">
  
  <div class="jewelry-details">
    <span class="collection-tag">Exclusive Drop</span>
    <h4>Iced Out Clover Bracelet</h4>
    <div class="description">Solid S925 CZ handset with clarity simulated diamonds. Maximum shine.</div>
    <div class="price-tag">$110.00</div>
  </div>

  <form id="orderForm" action="https://formspree.io/f/mqevlpky" method="POST">
    <input type="hidden" name="Estilo" id="hiddenClover">
    
    <div class="options-grid">
      <div class="option-card" onclick="selectOption(this, 'Blue')"><img src="https://i.ibb.co/9ktPwHwY/IMG-7588.jpg"><span>Blue</span><div class="select-indicator">Select</div></div>
      <div class="option-card" onclick="selectOption(this, 'Green')"><img src="https://i.ibb.co/KcngDcLH/IMG-7593.jpg"><span>Green</span><div class="select-indicator">Select</div></div>
      <div class="option-card" onclick="selectOption(this, 'Pink')"><img src="https://i.ibb.co/YsqQ6Bj/IMG-7592.jpg"><span>Pink</span><div class="select-indicator">Select</div></div>
      <div class="option-card" onclick="selectOption(this, 'Mixed')"><img src="https://i.ibb.co/5XsFkS0k/IMG-7594.jpg"><span>Mixed</span><div class="select-indicator">Select</div></div>
      <div class="option-card" onclick="selectOption(this, 'Clear')"><img src="https://i.ibb.co/JWVGxrNv/IMG-7591.jpg"><span>Clear</span><div class="select-indicator">Select</div></div>
    </div>

    <label style="font-weight:bold; font-size: 14px;">Select Size:</label>
    <select name="Talla">
      <option value="7 inch">7 inch</option>
      <option value="8 inch">8 inch</option>
    </select>

    <input type="text" name="Nombre" placeholder="Full Name" required>
    <input type="email" name="Email" placeholder="Email Address" required>
    <input type="text" name="Direccion" placeholder="Shipping Address" required>
    <input type="text" name="Apartamento" placeholder="Apt / Suite (Optional)">
    <input type="text" name="Estado" placeholder="State" required>
    <input type="text" name="ZipCode" placeholder="Zip Code" required>

    <div class="shipment-box">
      <div style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">SHIPMENT METHOD</div>
      <label class="shipment-option">
        <div><input type="radio" name="shipping" value="standard" checked onchange="updateTotal()"> Standard Shipping<div style="font-size: 10px; color: #888;">3 - 5 Business Days</div></div>
        <div style="font-weight: bold;">FREE</div>
      </label>
      <label class="shipment-option">
        <div><input type="radio" name="shipping" value="express" onchange="updateTotal()"> Express Delivery<div style="font-size: 10px; color: #888;">1 - 2 Business Days</div></div>
        <div style="font-weight: bold;">+$10.00</div>
      </label>
    </div>

    <div class="summary-box">
      <div class="summary-row"><span>Bracelet:</span> <span>$110.00</span></div>
      <div class="summary-row"><span>Shipping:</span> <span id="shipPrice">$0.00</span></div>
      <div class="summary-row"><span>Taxes (9.45%):</span> <span id="taxPrice">$10.40</span></div>
      <div class="total-row"><span>Total:</span> <span id="totalPrice">$120.40</span></div>
    </div>

    <button type="button" onclick="submitAndPay()">CONFIRM & PAY VIA CASH APP</button>
  </form>
</div>

<script>
  function updateTotal() {
    const isExpress = document.querySelector('input[name="shipping"]:checked').value === 'express';
    const bracelet = 110.00;
    const shipping = isExpress ? 10.00 : 0.00;
    const subtotal = bracelet + shipping;
    const tax = subtotal * 0.0945;
    const total = subtotal + tax;

    document.getElementById('shipPrice').innerText = `$${shipping.toFixed(2)}`;
    document.getElementById('taxPrice').innerText = `$${tax.toFixed(2)}`;
    document.getElementById('totalPrice').innerText = `$${total.toFixed(2)}`;
  }

  function selectOption(el, name) {
    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('hiddenClover').value = name;
  }
  function submitAndPay() {
    if(!document.getElementById('hiddenClover').value) { alert("Please select a style!"); return; }
    document.getElementById('orderForm').submit();
    window.open("https://cash.app/$Nemzzz0", "_blank");
  }
</script>

</body>
</html>
